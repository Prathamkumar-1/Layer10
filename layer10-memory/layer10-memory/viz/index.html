// ── Color map ──────────────────────────────────────────────────────────────
const TYPE_COLOR = {
  Person:   "#667eea",
  Project:  "#f6ad55",
  Decision: "#68d391",
  Company:  "#fc8181",
  Team:     "#d6bcfa",
  Document: "#76e4f7",
};
const TYPE_RADIUS = {
  Person: 14, Project: 18, Decision: 16, Company: 14, Team: 13, Document: 12,
};

// ── Claim type colors ──────────────────────────────────────────────────────
const CLAIM_COLOR = {
  MADE_DECISION: "#68d391", ASSIGNED_TO: "#667eea", PART_OF: "#a78bfa",
  COUNTERPARTY_OF: "#fc8181", REVISES: "#f6ad55", CANCELS: "#fc8181",
  MENTIONED: "#718096", AUTHORED: "#76e4f7",
};

// ── Build nodes / links ────────────────────────────────────────────────────
let allNodes = GRAPH_DATA.entities.map(e => ({
  id: e.id,
  type: e.type,
  name: e.canonical_name,
  aliases: JSON.parse(e.aliases || "[]"),
  attributes: JSON.parse(e.attributes || "{}"),
  first_seen: e.first_seen,
  last_seen: e.last_seen,
}));

let allLinks = GRAPH_DATA.claims
  .filter(c => c.subject_id && c.object_id)
  .map(c => ({
    id: c.id,
    source: c.subject_id,
    target: c.object_id,
    type: c.type,
    value: c.value,
    confidence: c.confidence,
    valid_from: c.valid_from,
    valid_to: c.valid_to,
    superseded: !!c.valid_to,
    evidence: c.evidence || [],
  }));

// update stats
document.getElementById("stat-entities").textContent = allNodes.length + " entities";
document.getElementById("stat-claims").textContent = allLinks.length + " claims";
document.getElementById("stat-merges").textContent = GRAPH_DATA.merges.length + " merges";

// ── SVG setup ──────────────────────────────────────────────────────────────
const svgEl = document.getElementById("svg");
const svg = d3.select(svgEl);
const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.3, 3]).on("zoom", e => g.attr("transform", e.transform)));

let width = svgEl.clientWidth, height = svgEl.clientHeight;
window.addEventListener("resize", () => { width = svgEl.clientWidth; height = svgEl.clientHeight; });

// ── Simulation ─────────────────────────────────────────────────────────────
const simulation = d3.forceSimulation()
  .force("link", d3.forceLink().id(d => d.id).distance(d => d.superseded ? 180 : 130))
  .force("charge", d3.forceManyBody().strength(-350))
  .force("center", d3.forceCenter())
  .force("collision", d3.forceCollide(d => TYPE_RADIUS[d.type] + 12));

let linkSel, nodeSel, labelSel;

// ── Filter state ───────────────────────────────────────────────────────────
let activeType = "all";
let searchTerm = "";
let showSuperseded = true;

function filteredNodes() {
  return allNodes.filter(n => {
    if (activeType !== "all" && n.type !== activeType) return false;
    if (searchTerm && !n.name.toLowerCase().includes(searchTerm)) return false;
    return true;
  });
}

function filteredLinks(nodes) {
  const nodeIds = new Set(nodes.map(n => n.id));
  return allLinks.filter(l => {
    if (!showSuperseded && l.superseded) return false;
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    return nodeIds.has(sid) && nodeIds.has(tid);
  });
}

function render() {
  const nodes = filteredNodes();
  const links = filteredLinks(nodes);

  g.selectAll("*").remove();

  // links
  linkSel = g.append("g").selectAll("line")
    .data(links).join("line")
    .attr("class", d => "link" + (d.superseded ? " superseded" : ""))
    .attr("stroke", d => CLAIM_COLOR[d.type] || "#4a5568")
    .on("click", (e, d) => showClaimPanel(d))
    .on("mouseenter", (e, d) => showTooltip(e, `<b>${d.type}</b><br>${(d.value||"").slice(0,80)}`))
    .on("mouseleave", hideTooltip);

  // link labels
  g.append("g").selectAll("text")
    .data(links).join("text")
    .attr("class", "link-label")
    .text(d => d.type.replace(/_/g, " "))
    .on("click", (e, d) => showClaimPanel(d));

  // nodes
  const nodeG = g.append("g").selectAll("g")
    .data(nodes, d => d.id).join("g")
    .attr("class", "node")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on("click", (e, d) => showEntityPanel(d))
    .on("mouseenter", (e, d) => showTooltip(e, `<b>${d.name}</b><br><span style="color:#718096">${d.type}</span>`))
    .on("mouseleave", hideTooltip);

  nodeG.append("circle")
    .attr("r", d => TYPE_RADIUS[d.type] || 12)
    .attr("fill", d => TYPE_COLOR[d.type] || "#718096")
    .attr("fill-opacity", 0.85)
    .attr("stroke", d => TYPE_COLOR[d.type] || "#718096");

  nodeG.append("text")
    .attr("dy", d => (TYPE_RADIUS[d.type] || 12) + 12)
    .attr("text-anchor", "middle")
    .text(d => d.name.length > 18 ? d.name.slice(0, 16) + "…" : d.name);

  simulation.nodes(nodes);
  simulation.force("link").links(links);
  simulation.force("center").x(width / 2).y(height / 2);
  simulation.alpha(0.8).restart();

  simulation.on("tick", () => {
    linkSel
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => targetX(d)).attr("y2", d => targetY(d));

    g.selectAll(".link-label")
      .attr("x", d => ((d.source.x || 0) + (d.target.x || 0)) / 2)
      .attr("y", d => ((d.source.y || 0) + (d.target.y || 0)) / 2 - 4);

    nodeG.attr("transform", d => `translate(${d.x},${d.y})`);
  });
}

function targetX(d) {
  const r = TYPE_RADIUS[d.target.type] || 12;
  const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  return d.target.x - (dx / dist) * (r + 2);
}
function targetY(d) {
  const r = TYPE_RADIUS[d.target.type] || 12;
  const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  return d.target.y - (dy / dist) * (r + 2);
}

// ── Tooltip ────────────────────────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");
function showTooltip(e, html) {
  tooltip.innerHTML = html;
  tooltip.style.opacity = 1;
  tooltip.style.left = (e.offsetX + 14) + "px";
  tooltip.style.top = (e.offsetY - 10) + "px";
}
function hideTooltip() { tooltip.style.opacity = 0; }
svgEl.addEventListener("mousemove", e => {
  tooltip.style.left = (e.offsetX + 14) + "px";
  tooltip.style.top = (e.offsetY - 10) + "px";
});

// ── Side panels ────────────────────────────────────────────────────────────
function openPanel(html) {
  document.getElementById("panel-placeholder").style.display = "none";
  const pc = document.getElementById("panel-content");
  pc.style.display = "block";
  pc.innerHTML = html;
}

function showEntityPanel(node) {
  const relatedClaims = GRAPH_DATA.claims.filter(c =>
    c.subject_id === node.id || c.object_id === node.id
  );
  const merges = GRAPH_DATA.merges.filter(m => {
    try { const d = JSON.parse(m.details); return d.canonical_id === node.id || d.duplicate_id === node.id; }
    catch { return false; }
  });

  const aliasHtml = node.aliases.length
    ? node.aliases.map(a => `<span class="alias-chip">${a}</span>`).join("")
    : '<span style="color:#4a5568">none</span>';

  const attribs = Object.entries(node.attributes || {}).filter(([,v]) => v);
  const attrHtml = attribs.length
    ? attribs.map(([k,v]) => `<div class="merge-row"><b>${k}:</b> ${v}</div>`).join("")
    : "";

  const claimsHtml = relatedClaims.map(c => {
    const isSuperseded = !!c.valid_to;
    const colorDot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${CLAIM_COLOR[c.type]||'#718096'};margin-right:5px;"></span>`;
    const badge = isSuperseded
      ? `<span class="tag-superseded">superseded</span>`
      : `<span class="tag-current">current</span>`;
    const evCount = (c.evidence || []).length;
    return `
      <div class="claim-row ${isSuperseded ? 'superseded' : ''}" onclick="showClaimPanel(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div class="claim-type">${colorDot}${c.type.replace(/_/g,' ')}${badge}</div>
        <div class="claim-value">${c.value || '—'}</div>
        <div class="claim-meta">${c.valid_from ? c.valid_from.slice(0,10) : ''}  ·  conf ${(c.confidence||0).toFixed(2)}  ·  ${evCount} evidence</div>
        <div class="confidence-bar"><div class="confidence-fill" style="width:${(c.confidence||0)*100}%"></div></div>
      </div>`;
  }).join("") || '<div style="color:#4a5568;font-size:12px;">No claims</div>';

  const mergeHtml = merges.length
    ? merges.map(m => {
        let d; try { d = JSON.parse(m.details); } catch { d = {}; }
        return `<div class="merge-row">${m.merge_type}: ${d.reason || d.merged_name || JSON.stringify(d).slice(0,60)}</div>`;
      }).join("")
    : '<div style="color:#4a5568;font-size:12px;">No merges</div>';

  openPanel(`
    <div class="panel-type">${node.type}</div>
    <div class="panel-title">${node.name}</div>
    <div class="section-label">Aliases</div>
    <div style="margin-bottom:4px;">${aliasHtml}</div>
    ${attrHtml ? `<div class="section-label" style="margin-top:12px;">Attributes</div>${attrHtml}` : ""}
    ${node.first_seen ? `<div style="font-size:11px;color:#718096;margin-top:10px;">First seen: ${node.first_seen.slice(0,10)} · Last: ${(node.last_seen||'').slice(0,10)}</div>` : ""}
    <div class="section-label">Claims (${relatedClaims.length})</div>
    ${claimsHtml}
    <div class="section-label">Merge / Dedup Log</div>
    ${mergeHtml}
  `);
}

function showClaimPanel(claim) {
  const subjectEnt = allNodes.find(n => n.id === (claim.subject_id || claim.source?.id || claim.source));
  const objectEnt  = allNodes.find(n => n.id === (claim.object_id  || claim.target?.id || claim.target));
  const isSuperseded = !!claim.valid_to;

  const evHtml = (claim.evidence || []).map(ev => `
    <div class="evidence-box">
      <div class="evidence-source">${ev.source_id} · ${(ev.source_ts||'').slice(0,10)}</div>
      <div class="evidence-excerpt">"${ev.excerpt}"</div>
    </div>
  `).join("") || '<div style="color:#4a5568;font-size:12px;">No stored evidence</div>';

  openPanel(`
    <div class="panel-type">Claim · ${claim.type.replace(/_/g,' ')}</div>
    <div class="panel-title" style="font-size:13px;">${claim.value || '—'}</div>
    <div style="margin-top:12px;font-size:12px;color:#a0aec0;">
      <b>Subject:</b> ${subjectEnt ? subjectEnt.name : claim.subject_id || '—'}<br>
      <b>Object:</b> ${objectEnt ? objectEnt.name : claim.object_id || '—'}<br>
      <b>Valid from:</b> ${(claim.valid_from||'—').slice(0,10)}<br>
      <b>Valid to:</b> ${claim.valid_to ? claim.valid_to.slice(0,10) : <i>still current</i>}<br>
      <b>Confidence:</b> ${(claim.confidence||0).toFixed(2)}
    </div>
    <div class="confidence-bar" style="margin-top:8px;"><div class="confidence-fill" style="width:${(claim.confidence||0)*100}%"></div></div>
    ${isSuperseded ? '<div style="margin-top:10px;padding:8px 10px;background:#742a2a33;border-radius:6px;font-size:12px;color:#fc8181;">⚠ This claim was superseded — it reflects historical state, not current truth.</div>' : ''}
    <div class="section-label">Supporting Evidence (${(claim.evidence||[]).length})</div>
    ${evHtml}
  `);
}

// ── Toolbar interactions ───────────────────────────────────────────────────
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeType = btn.dataset.type;
    render();
  });
});

document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value.toLowerCase().trim();
  render();
});

document.getElementById("show-superseded").addEventListener("change", e => {
  showSuperseded = e.target.checked;
  render();
});

// ── Initial render ─────────────────────────────────────────────────────────
render();
</script>
